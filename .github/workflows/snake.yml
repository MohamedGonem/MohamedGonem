name: Generate Snake
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: MohamedGonem
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - uses: actions/checkout@v4
        with:
          ref: output
      - run: cp dist/* .
      - uses: EndBug/add-and-commit@v9
        with:
          branch: output
